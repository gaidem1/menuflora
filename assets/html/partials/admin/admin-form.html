<!-- ============================================
   ADMIN FORM — ADD / EDIT MENU
   ============================================ -->
<div id="formCard" style="margin-top:24px;border-top:2px solid var(--line);padding-top:20px;">
    
    <!-- Form Title -->
    <h3 id="formTitle" style="margin-bottom:12px;">📝 Tambah Menu Baru</h3>

    <!-- ===== ROW 1: Name & Price ===== -->
    <div class="form-row">
        <div class="form-group">
            <label>Nama Menu *</label>
            <input type="text" id="inputName" placeholder="Contoh: Ice Rost Latte">
        </div>
        <div class="form-group">
            <label>Harga (Rp) *</label>
            <input type="number" id="inputPrice" placeholder="7000" min="0">
        </div>
    </div>

    <!-- ===== DESCRIPTION ===== -->
    <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="inputDesc" rows="2" placeholder="Kopi dingin dengan rasa yang segar."></textarea>
    </div>

    <!-- ===== ROW 2: Category & Tag ===== -->
    <div class="form-row">
        <div class="form-group">
            <label>Kategori</label>
            <select id="inputCategory">
                <option value="kopi-klasik">☕ Kopi</option>
                <option value="non-kopi">🍵 Non Kopi</option>
                <option value="camilan">🍽️ Camilan</option>
                <option value="mie">🍜 Mie & Topping</option>
                <option value="signature">⭐ Signature</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tag (opsional)</label>
            <select id="inputTag">
                <option value="">Tidak ada</option>
                <option value="Favorit">⭐ Favorit</option>
                <option value="Promo">🔥 Promo</option>
                <option value="New">✨ New</option>
            </select>
        </div>
    </div>

    <!-- ===== ROW 3: Stock & Promo Price ===== -->
    <div class="form-row">
        <div class="form-group">
            <label>Stok (0 = Habis) *</label>
            <input type="number" id="inputStock" value="10" min="0">
        </div>
        <div class="form-group">
            <label>Harga Promo</label>
            <input type="number" id="inputPromo" placeholder="5000" min="0">
        </div>
    </div>

    <!-- ===== UPLOAD GAMBAR ===== -->
    <div class="form-group">
        <label>📸 Foto Menu</label>

        <!-- Drop Zone -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📤</div>
            <div class="upload-text">
                <strong>Taruh gambar di sini</strong><br>
                <span>atau klik untuk memilih file</span>
            </div>
            <div class="upload-hint">JPG, PNG, WebP • Maks 5MB</div>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <!-- Progress Bar -->
        <div class="upload-progress hidden" id="uploadProgress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">⏳ Mengupload... 0%</div>
        </div>

        <!-- Preview -->
        <div class="upload-preview-wrapper hidden" id="previewWrapper">
            <img id="previewImage" alt="Preview gambar menu">
            <div class="preview-actions">
                <button type="button" class="btn btn-sm" id="removeImageBtn">✕ Hapus</button>
                <span class="preview-status" id="previewStatus">✅ Upload berhasil</span>
            </div>
        </div>

        <input type="text" id="inputImage" hidden>
        <input type="text" id="inputImagePublicId" hidden>
    </div>

    <!-- ===== FORM ACTIONS ===== -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" id="saveBtn">💾 Simpan Menu</button>
        <button class="btn btn-outline" id="cancelBtn">Batal</button>
    </div>

</div>
