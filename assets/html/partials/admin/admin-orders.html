<!-- ============================================
   ADMIN ORDERS — PENDING / ALL
   ============================================ -->
<div style="margin-top:24px;border-top:2px solid var(--line);padding-top:20px;">
    
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <h3 style="margin:0;">📦 Pesanan</h3>
        <div style="display:flex;gap:6px;">
            <button type="button" class="btn btn-sm" id="ordersFilterPending" 
                    style="background:var(--brass);color:var(--leaf-deep);">
                ⏳ Pending
            </button>
            <button type="button" class="btn btn-sm btn-outline" id="ordersFilterAll">
                📋 Semua
            </button>
        </div>
    </div>

    <!-- Orders List -->
    <div id="pendingOrdersList" style="margin-top:12px;">
        <p style="color:var(--text-muted);">Memuat...</p>
    </div>

</div>

<!-- CSS Pendukung (jika belum ada) -->
<style>
    #pendingOrdersList { margin-top: 12px; }
    .pending-item {
        background: var(--bg-body);
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
    }
    .pending-item:last-child { margin-bottom: 0; }
    .pending-item .date { font-weight: 600; }
    .pending-item .items { font-size: 14px; }
    .pending-item .total { font-weight: 600; color: var(--brass); }
    .pending-item .actions { display: flex; gap: 8px; }
    
    .status-badge {
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 100px;
        display: inline-block;
        margin-top: 4px;
    }
    .status-badge.pending { background: #f39c12; color: white; }
    .status-badge.completed { background: #27ae60; color: white; }
    .status-badge.cancelled { background: #e74c3c; color: white; }
    
    @media (max-width: 600px) {
        .pending-item {
            flex-direction: column;
            align-items: flex-start;
        }
        .pending-item .actions {
            width: 100%;
            justify-content: flex-end;
        }
    }
</style>
